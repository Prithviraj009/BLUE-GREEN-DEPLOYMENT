apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-blue
  labels:
    app: service-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service-blue
  template:
    metadata:
      labels:
        app: service-blue
    spec:
      containers:
        - name: service-blue
          image: snowman0000/bg-deployment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10