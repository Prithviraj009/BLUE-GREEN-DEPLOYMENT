apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-blue
  labels:
    app: bg-app
    version: blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bg-app
      version: blue
  template:
    metadata:
      labels:
        app: bg-app
        version: blue
    spec:
      containers:
        - name: app
          image: snowman0000/bg-deployment:blue
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20